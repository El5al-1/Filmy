<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="El-5al Movie - Premium offline personal movie journal">
  <meta name="theme-color" content="#09090b">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <title>El-5al Movie</title>
  <link rel="stylesheet" href="style.css">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎬</text></svg>">
</head>
<body>

  <div class="app">
    
    <!-- Mobile Menu Button -->
    <button class="menu-btn" id="menuBtn">☰</button>
    <div class="overlay" id="overlay"></div>

    <!-- Sidebar -->
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-header">
        <div class="logo">
          <div class="logo-icon">🎬</div>
          <div class="logo-info">
            <h1 id="logoTitle">El-5al Movie</h1>
            <span id="logoTag">MOVIE JOURNAL</span>
          </div>
        </div>
      </div>

      <nav class="sidebar-menu">
        <div class="menu-section">
          <p class="menu-label" id="menuLabel1">Library</p>
          <button class="menu-item active" data-page="movies">
            <span class="menu-icon">🎬</span>
            <span class="menu-text" id="navMovies">Movies</span>
            <span class="menu-badge" id="countMovies">0</span>
          </button>
          <button class="menu-item" data-page="series">
            <span class="menu-icon">🎞️</span>
            <span class="menu-text" id="navSeries">Film Series</span>
            <span class="menu-badge" id="countSeries">0</span>
          </button>
          <button class="menu-item" data-page="tvshows">
            <span class="menu-icon">📺</span>
            <span class="menu-text" id="navTvshows">TV Shows</span>
            <span class="menu-badge" id="countTvshows">0</span>
          </button>
        </div>

        <div class="menu-section">
          <p class="menu-label" id="menuLabel2">Tools</p>
          <button class="menu-item" id="exportBtn">
            <span class="menu-icon">💾</span>
            <span class="menu-text" id="navExport">Export Backup</span>
          </button>
          <button class="menu-item" id="clearBtn">
            <span class="menu-icon">🗑️</span>
            <span class="menu-text" id="navClear">Clear All</span>
          </button>
        </div>
      </nav>

      <div class="sidebar-footer">
        <div class="lang-switch">
          <button class="lang-btn active" id="langEn">EN</button>
          <button class="lang-btn" id="langAr">عربي</button>
        </div>
      </div>
    </aside>

    <!-- Main Content -->
    <main class="main">
      
      <!-- Header -->
      <header class="header">
        <div class="header-info">
          <span class="header-icon" id="pageIcon">🎬</span>
          <div>
            <h2 id="pageTitle">Movies</h2>
            <p id="pageCount">0 items</p>
          </div>
        </div>
        <div class="header-actions">
          <div class="search-box">
            <span class="search-icon">🔍</span>
            <input type="text" id="searchInput" placeholder="Search...">
          </div>
          <button class="btn btn-gold" id="addBtn">+ Add</button>
        </div>
      </header>

      <!-- Page Content -->
      <div class="content">
        
        <!-- Movies Page -->
        <section class="page active" id="pageMovies">
          <div class="stats" id="statsMovies"></div>
          <div class="toolbar">
            <div class="filters" id="filters">
              <button class="filter active" data-filter="all"><span>🎬</span> <span id="fAll">All</span></button>
              <button class="filter" data-filter="watched"><span>✅</span> <span id="fWatched">Watched</span></button>
              <button class="filter" data-filter="watching" id="fWatchingBtn" style="display:none"><span>▶️</span> <span id="fWatching">Watching</span></button>
              <button class="filter" data-filter="planning"><span>📋</span> <span id="fPlanning">Planning</span></button>
              <button class="filter" data-filter="favorites"><span>❤️</span> <span id="fFavorites">Favorites</span></button>
            </div>
            <div class="toolbar-end">
              <select id="genreFilter"></select>
              <select id="sortFilter"></select>
            </div>
          </div>
          <div class="grid" id="gridMovies"></div>
        </section>

        <!-- Series Page -->
        <section class="page" id="pageSeries">
          <div class="stats" id="statsSeries"></div>
          <div class="grid" id="gridSeries"></div>
        </section>

        <!-- TV Shows Page -->
        <section class="page" id="pageTvshows">
          <div class="stats" id="statsTvshows"></div>
          <div class="grid" id="gridTvshows"></div>
        </section>

      </div>

      <!-- Footer -->
      <footer class="footer">
        <p id="footerText">Every Film You Watch, Every Memory You Keep.</p>
      </footer>

    </main>
  </div>

  <!-- Add/Edit Modal -->
  <div class="modal-wrap" id="formModal">
    <div class="modal">
      <div class="modal-head">
        <h3 id="formTitle">Add New</h3>
        <button class="close-btn" data-close>&times;</button>
      </div>
      <form id="itemForm">
        <div class="modal-body" id="formBody"></div>
        <div class="modal-foot">
          <button type="button" class="btn btn-gray" data-close id="cancelBtn">Cancel</button>
          <button type="submit" class="btn btn-gold" id="saveBtn">Save</button>
        </div>
      </form>
    </div>
  </div>

  <!-- Detail Modal -->
  <div class="modal-wrap" id="detailModal">
    <div class="modal">
      <div class="modal-head">
        <h3 id="detailTitle">Details</h3>
        <button class="close-btn" data-close>&times;</button>
      </div>
      <div class="modal-body" id="detailBody"></div>
    </div>
  </div>

  <!-- Confirm Modal -->
  <div class="modal-wrap" id="confirmModal">
    <div class="modal modal-sm">
      <div class="modal-head">
        <h3>⚠️ Confirm</h3>
        <button class="close-btn" data-close>&times;</button>
      </div>
      <div class="modal-body center">
        <p class="confirm-msg" id="confirmMsg">Are you sure?</p>
      </div>
      <div class="modal-foot">
        <button class="btn btn-gray" data-close id="confirmNo">Cancel</button>
        <button class="btn btn-red" id="confirmYes">Delete</button>
      </div>
    </div>
  </div>

  <!-- Toast Container -->
  <div id="toasts"></div>

  <script src="script.js"></script>
</body>
</html>
