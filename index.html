<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="El5al Films - A premium offline personal movie journal">
  <meta name="theme-color" content="#0f0f0f">
  <title>El5al Films — My Personal Movie Collection</title>
  <link rel="stylesheet" href="style.css">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🎬</text></svg>">
</head>
<body>

  <!-- ============================================
       HEADER
       ============================================ -->
  <header class="header">
    <div class="container header-inner">
      <!-- Logo -->
      <a href="#" class="logo" onclick="return false;">
        <span class="logo-icon">🎬</span>
        <span class="logo-text">
          <span class="logo-title">El5al Films</span>
          <span class="logo-subtitle">My Personal Movie Collection</span>
        </span>
      </a>

      <!-- Header Actions -->
      <div class="header-actions">
        <!-- Search -->
        <div class="search-wrapper">
          <span class="search-icon">🔍</span>
          <input
            type="text"
            id="search-input"
            class="search-input"
            placeholder="Search movies..."
            autocomplete="off"
          >
        </div>
        <!-- Add Movie Button -->
        <button class="btn btn-primary" id="btn-add-movie">
          + Add Movie
        </button>
      </div>
    </div>
  </header>

  <!-- ============================================
       MAIN CONTENT
       ============================================ -->
  <main class="container">

    <!-- Dashboard Stats -->
    <section class="dashboard">
      <div class="stats-grid">
        <div class="stat-card">
          <div class="stat-icon">🎞️</div>
          <div class="stat-info">
            <span class="stat-value" id="stat-total">0</span>
            <span class="stat-label">Total Movies</span>
          </div>
        </div>
        <div class="stat-card">
          <div class="stat-icon">✅</div>
          <div class="stat-info">
            <span class="stat-value" id="stat-watched">0</span>
            <span class="stat-label">Watched</span>
          </div>
        </div>
        <div class="stat-card">
          <div class="stat-icon">📋</div>
          <div class="stat-info">
            <span class="stat-value" id="stat-planning">0</span>
            <span class="stat-label">Planning</span>
          </div>
        </div>
        <div class="stat-card">
          <div class="stat-icon">❤️</div>
          <div class="stat-info">
            <span class="stat-value" id="stat-favorites">0</span>
            <span class="stat-label">Favorites</span>
          </div>
        </div>
        <div class="stat-card">
          <div class="stat-icon">⭐</div>
          <div class="stat-info">
            <span class="stat-value" id="stat-rating">0.0</span>
            <span class="stat-label">Avg Rating</span>
          </div>
        </div>
      </div>
    </section>

    <!-- Toolbar: Filters + Sort -->
    <section class="toolbar">
      <div class="filter-tabs">
        <button class="filter-tab active" data-filter="all">🎬 All</button>
        <button class="filter-tab" data-filter="watched">✅ Watched</button>
        <button class="filter-tab" data-filter="planning">📋 Planning</button>
        <button class="filter-tab" data-filter="favorites">❤️ Favorites</button>
      </div>
      <div class="toolbar-right">
        <select class="genre-select" id="genre-filter-select">
          <option value="all">All Genres</option>
        </select>
        <select class="sort-select" id="sort-select">
          <option value="newest">🕐 Newest First</option>
          <option value="oldest">🕐 Oldest First</option>
          <option value="rating">⭐ Highest Rating</option>
          <option value="alpha">🔤 Alphabetical</option>
        </select>
      </div>
    </section>

    <!-- Movies Grid -->
    <section class="movies-section">
      <div class="movies-grid" id="movies-grid">
        <!-- Movie cards rendered by JS -->
      </div>
    </section>

    <!-- Data Management Bar -->
    <section class="data-bar">
      <button class="btn btn-secondary btn-sm" id="btn-export">📥 Export JSON</button>
      <button class="btn btn-secondary btn-sm" id="btn-import">📤 Import JSON</button>
      <button class="btn btn-danger btn-sm" id="btn-clear-all">🗑️ Clear All</button>
      <input type="file" id="import-input" class="hidden-input" accept=".json">
    </section>

  </main>

  <!-- ============================================
       FOOTER
       ============================================ -->
  <footer class="footer">
    <p class="footer-text">
      🎬 <span>El5al Films</span> — Built with love, no frameworks, pure code.
    </p>
  </footer>

  <!-- ============================================
       ADD / EDIT MOVIE MODAL
       ============================================ -->
  <div class="modal-overlay" id="movie-modal">
    <div class="modal">
      <div class="modal-header">
        <h2 class="modal-title" id="modal-title">🎬 Add New Movie</h2>
        <button class="modal-close" data-close-modal>&times;</button>
      </div>
      <form id="movie-form" novalidate>
        <div class="modal-body">
          <!-- Title -->
          <div class="form-group">
            <label class="form-label" for="input-title">Movie Title *</label>
            <input type="text" id="input-title" class="form-input" placeholder="Enter movie title..." maxlength="200" required>
            <div class="form-error" id="error-title"></div>
          </div>

          <!-- Genre & Year -->
          <div class="form-row">
            <div class="form-group">
              <label class="form-label" for="input-genre">Genre</label>
              <select id="input-genre" class="form-select">
                <option value="">Select genre</option>
              </select>
            </div>
            <div class="form-group">
              <label class="form-label" for="input-year">Release Year</label>
              <input type="number" id="input-year" class="form-input" placeholder="e.g. 2024" min="1888" max="2099">
            </div>
          </div>

          <!-- Rating -->
          <div class="form-group">
            <label class="form-label">Rating</label>
            <div class="rating-display">
              <input type="range" id="input-rating" class="rating-slider" min="0" max="10" value="5" step="1">
              <span class="rating-number" id="rating-number">5</span>
            </div>
          </div>

          <!-- Status -->
          <div class="form-group">
            <label class="form-label" for="input-status">Status</label>
            <select id="input-status" class="form-select">
              <option value="watched">✅ Watched</option>
              <option value="planning">📋 Planning to Watch</option>
            </select>
          </div>

          <!-- Favorite -->
          <div class="form-group">
            <label class="form-checkbox-wrapper">
              <input type="checkbox" id="input-favorite" class="form-checkbox">
              <span class="form-checkbox-label">❤️ Mark as Favorite</span>
            </label>
          </div>

          <!-- Notes -->
          <div class="form-group">
            <label class="form-label" for="input-notes">Notes</label>
            <textarea id="input-notes" class="form-textarea" placeholder="Your thoughts about this movie..." maxlength="1000"></textarea>
          </div>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-secondary" data-close-modal>Cancel</button>
          <button type="submit" class="btn btn-primary">💾 Save Movie</button>
        </div>
      </form>
    </div>
  </div>

  <!-- ============================================
       MOVIE DETAIL MODAL
       ============================================ -->
  <div class="modal-overlay" id="detail-modal">
    <div class="modal">
      <div class="modal-header">
        <h2 class="modal-title">🎬 Movie Details</h2>
        <button class="modal-close" data-close-modal>&times;</button>
      </div>
      <div class="modal-body">
        <!-- Dynamically populated by JS -->
      </div>
    </div>
  </div>

  <!-- ============================================
       CONFIRM DIALOG MODAL
       ============================================ -->
  <div class="modal-overlay" id="confirm-modal">
    <div class="modal" style="max-width: 420px;">
      <div class="modal-header">
        <h2 class="modal-title">⚠️ Confirm</h2>
        <button class="modal-close" data-close-modal>&times;</button>
      </div>
      <div class="modal-body">
        <div class="confirm-icon">⚠️</div>
        <p class="confirm-text" id="confirm-text">Are you sure?</p>
      </div>
      <div class="modal-footer">
        <button class="btn btn-secondary" data-close-modal>Cancel</button>
        <button class="btn btn-danger" id="confirm-yes">Yes, Delete</button>
      </div>
    </div>
  </div>

  <!-- ============================================
       NOTIFICATIONS CONTAINER
       ============================================ -->
  <div id="notification-container" class="notification-container"></div>

  <!-- JavaScript -->
  <script src="script.js"></script>
</body>
</html>
