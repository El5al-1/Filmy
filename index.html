<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="El-5al Movie - Premium offline personal movie journal">
  <meta name="theme-color" content="#09090b">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <title>El-5al Movie</title>
  <link rel="stylesheet" href="style.css">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🎬</text></svg>">
</head>
<body>

  <div class="app-layout">
    
    <!-- Mobile Toggle -->
    <button class="mobile-toggle" id="mobile-toggle">☰</button>
    <div class="sidebar-backdrop"></div>

    <!-- Sidebar -->
    <aside class="sidebar">
      <div class="sidebar-brand">
        <a href="#" class="brand-link" onclick="return false">
          <div class="brand-icon">🎬</div>
          <div class="brand-text">
            <span class="brand-name" id="brand-name">El-5al Movie</span>
            <span class="brand-tagline" id="brand-tagline">MOVIE JOURNAL</span>
          </div>
        </a>
      </div>

      <nav class="sidebar-nav">
        <div class="nav-group">
          <div class="nav-label" id="nav-main-label">Library</div>
          <button class="nav-link active" data-page="movies">
            <span class="icon">🎬</span>
            <span class="text" id="nav-movies-text">Movies</span>
            <span class="badge" id="nav-movies-count">0</span>
          </button>
          <button class="nav-link" data-page="series">
            <span class="icon">🎞️</span>
            <span class="text" id="nav-series-text">Film Series</span>
            <span class="badge" id="nav-series-count">0</span>
          </button>
          <button class="nav-link" data-page="tvshows">
            <span class="icon">📺</span>
            <span class="text" id="nav-tvshows-text">TV Shows</span>
            <span class="badge" id="nav-tvshows-count">0</span>
          </button>
        </div>

        <div class="nav-group">
          <div class="nav-label" id="nav-tools-label">Tools</div>
          <button class="nav-link" id="nav-export">
            <span class="icon">📥</span>
            <span class="text" id="nav-export-text">Export Backup</span>
          </button>
          <button class="nav-link" id="nav-clear">
            <span class="icon">🗑️</span>
            <span class="text" id="nav-clear-text">Clear All Data</span>
          </button>
        </div>
      </nav>

      <div class="sidebar-footer">
        <div class="lang-switcher">
          <button class="lang-btn active" id="lang-en">English</button>
          <button class="lang-btn" id="lang-ar">العربية</button>
        </div>
      </div>
    </aside>

    <!-- Main Area -->
    <main class="main-area">
      
      <!-- Header -->
      <header class="main-header">
        <div class="header-content">
          <div class="header-left">
            <div class="page-info">
              <div class="page-icon" id="header-icon">🎬</div>
              <div class="page-details">
                <h1 id="header-title">Movies</h1>
                <span id="header-count">0 items</span>
              </div>
            </div>
          </div>
          <div class="header-right">
            <div class="search-box">
              <span class="search-icon">🔍</span>
              <input type="text" id="search-input" class="search-input" placeholder="Search..." autocomplete="off">
            </div>
            <button class="btn btn-primary" id="add-btn">
              <span style="font-size:18px">+</span> Add Movie
            </button>
          </div>
        </div>
      </header>

      <!-- Content -->
      <div class="page-content">
        
        <!-- Movies Page -->
        <section class="page-section active" id="page-movies">
          <div class="stats-row" id="stats-movies"></div>
          <div class="toolbar">
            <div class="toolbar-left">
              <button class="filter-pill active" data-filter="all" id="filter-all">🎬 <span>All</span></button>
              <button class="filter-pill" data-filter="watched" id="filter-watched">✅ <span>Watched</span></button>
              <button class="filter-pill" data-filter="watching" id="filter-watching" style="display:none">▶️ <span>Watching</span></button>
              <button class="filter-pill" data-filter="planning" id="filter-planning">📋 <span>Planning</span></button>
              <button class="filter-pill" data-filter="favorites" id="filter-favorites">❤️ <span>Favorites</span></button>
            </div>
            <div class="toolbar-right">
              <select class="select-box" id="genre-select"></select>
              <select class="select-box" id="sort-select"></select>
            </div>
          </div>
          <div class="content-grid" id="grid-movies"></div>
        </section>

        <!-- Series Page -->
        <section class="page-section" id="page-series">
          <div class="stats-row" id="stats-series"></div>
          <div class="content-grid" id="grid-series"></div>
        </section>

        <!-- TV Shows Page -->
        <section class="page-section" id="page-tvshows">
          <div class="stats-row" id="stats-tvshows"></div>
          <div class="content-grid" id="grid-tvshows"></div>
        </section>

      </div>

      <!-- Footer -->
      <footer class="main-footer">
        <p class="footer-text" id="footer-text">Every Film You Watch, Every Memory You Keep.</p>
      </footer>

    </main>
  </div>

  <!-- Form Modal -->
  <div class="modal-backdrop" id="form-modal">
    <div class="modal">
      <div class="modal-header">
        <h2 class="modal-title" id="form-title">✨ New</h2>
        <button class="modal-close" data-close>✕</button>
      </div>
      <form id="content-form">
        <div class="modal-body" id="form-fields"></div>
        <div class="modal-footer">
          <button type="button" class="btn btn-secondary" data-close id="cancel-btn">Cancel</button>
          <button type="submit" class="btn btn-primary" id="save-btn">💾 Save</button>
        </div>
      </form>
    </div>
  </div>

  <!-- Detail Modal -->
  <div class="modal-backdrop" id="detail-modal">
    <div class="modal">
      <div class="modal-header">
        <h2 class="modal-title" id="detail-title">🎬 Details</h2>
        <button class="modal-close" data-close>✕</button>
      </div>
      <div class="modal-body" id="detail-body"></div>
    </div>
  </div>

  <!-- Confirm Modal -->
  <div class="modal-backdrop" id="confirm-modal">
    <div class="modal" style="max-width:400px">
      <div class="modal-header">
        <h2 class="modal-title">⚠️ Confirm</h2>
        <button class="modal-close" data-close>✕</button>
      </div>
      <div class="modal-body">
        <div class="confirm-content">
          <div class="confirm-icon">⚠️</div>
          <p class="confirm-text" id="confirm-text">Are you sure?</p>
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-secondary" data-close id="confirm-cancel">Cancel</button>
        <button class="btn btn-danger" id="confirm-yes">Delete</button>
      </div>
    </div>
  </div>

  <!-- Toasts -->
  <div id="toast-container" class="toast-container"></div>

  <script src="script.js"></script>
</body>
</html>
